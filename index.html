<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalkulator podłoża</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #d9f7d9, #e6f2ff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      width: 340px;
    }

    h1 {
      font-size: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    label {
      font-size: 14px;
      color: #333;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px 0;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: #4caf50;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #43a047;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #f1f8e9;
      border-radius: 10px;
      text-align: center;
      font-size: 16px;
      font-weight: bold;
      color: #2e7d32;
    }
  </style>
</head>

<body>

  <div class="app">
    <h1>🌱 Kalkulator podłoża</h1>

    <label>Kształt doniczki</label>
    <select id="ksztalt" onchange="zmienUI()">
      <option value="walec">Walec</option>
      <option value="kwadrat">Kwadrat</option>
    </select>

    <div id="pole1">
      <label>Średnica (cm)</label>
      <input id="srednica" type="number" placeholder="np. 20">
    </div>

    <div id="pole2">
      <label>Wysokość (cm)</label>
      <input id="wysokosc" type="number" placeholder="np. 25">
    </div>

    <div id="pole3" style="display:none;">
      <label>Szerokość (cm)</label>
      <input id="szerokosc" type="number" placeholder="np. 20">
    </div>

    <button onclick="oblicz()">Oblicz</button>

    <div class="result" id="wynik">
      Wpisz dane i kliknij „Oblicz”
    </div>
  </div>

  <script>
    function zmienUI() {
      let k = document.getElementById("ksztalt").value;

      if (k === "walec") {
        document.getElementById("pole1").style.display = "block";
        document.getElementById("pole3").style.display = "none";
      } else {
        document.getElementById("pole1").style.display = "none";
        document.getElementById("pole3").style.display = "block";
      }
    }

    function oblicz() {
      let k = document.getElementById("ksztalt").value;
      let h = parseFloat(document.getElementById("wysokosc").value);

      let objetosc = 0;

      if (k === "walec") {
        let d = parseFloat(document.getElementById("srednica").value);
        if (!d || !h) return blad();

        let r = d / 2;
        objetosc = Math.PI * r * r * h;

      } else {
        let a = parseFloat(document.getElementById("szerokosc").value);
        if (!a || !h) return blad();

        objetosc = a * a * h;
      }

      let litry = objetosc / 1000;

      document.getElementById("wynik").innerText =
        "🌿 Potrzebujesz ok. " + litry.toFixed(1) + " L podłoża";
    }

    function blad() {
      document.getElementById("wynik").innerText =
        "⚠️ Wpisz poprawne dane";
    }
  </script>

</body>
</html>
