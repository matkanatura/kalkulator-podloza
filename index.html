<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>🌿 Kalkulator podłoża</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
  body {
    margin: 0;
    font-family: 'Poppins', sans-serif;

    /* 🌿 TŁO MONSTERA */
    background-image: url("https://images.unsplash.com/photo-1614594975525-e45190c55d0b?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    min-height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* przyciemnienie tła */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
  }

  .app {
    position: relative;
    width: 360px;
    background: rgba(255,255,255,0.92);
    padding: 26px;
    border-radius: 18px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.3);
  }

  h1 {
    text-align: center;
    font-size: 22px;
    margin-bottom: 18px;
  }

  label {
    font-size: 13px;
    color: #333;
  }

  input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0 14px 0;
    border-radius: 10px;
    border: 1px solid #ccc;
    outline: none;
  }

  input:focus, select:focus {
    border-color: #4caf50;
  }

  button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: #2e7d32;
    color: white;
    font-size: 15px;
    cursor: pointer;
  }

  button:hover {
    background: #1b5e20;
  }

  .result {
    margin-top: 16px;
    padding: 14px;
    background: #e8f5e9;
    border-radius: 12px;
    text-align: center;
    font-weight: 600;
    color: #1b5e20;
  }

  .hint {
    margin-top: 8px;
    text-align: center;
    font-size: 12px;
    color: #444;
  }
</style>
</head>

<body>

<div class="app">
  <h1>🌿 Kalkulator podłoża</h1>

  <!-- KSZTAŁT -->
  <label>Kształt doniczki</label>
  <select id="ksztalt" onchange="zmiana()">
    <option value="kolo">🟢 Okrągła</option>
    <option value="prostokat">⬛ Prostokątna</option>
    <option value="stozek">🔺 Stożek</option>
  </select>

  <!-- ROŚLINA -->
  <label>Roślina</label>
  <select id="roslina">
    <option value="uniwersalne">Uniwersalne</option>
    <option value="monstera">Monstera</option>
    <option value="fikus">Fikus</option>
    <option value="kaktus">Kaktus</option>
    <option value="storczyk">Storczyk</option>
  </select>

  <!-- PARAMETRY -->
  <div id="poleA">
    <label>Średnica / szerokość (cm)</label>
    <input id="a" type="number" placeholder="np. 20">
  </div>

  <div id="poleB">
    <label>Szerokość dolna (cm) (tylko stożek)</label>
    <input id="b" type="number" placeholder="np. 15">
  </div>

  <label>Wysokość (cm)</label>
  <input id="h" type="number" placeholder="np. 25">

  <button onclick="oblicz()">Oblicz 🌱</button>

  <div class="result" id="wynik">Wpisz dane</div>
  <div class="hint" id="hint"></div>
</div>

<script>
function zmiana() {
  let k = document.getElementById("ksztalt").value;

  document.getElementById("poleB").style.display =
    (k === "stozek") ? "block" : "none";
}

function oblicz() {
  let k = document.getElementById("ksztalt").value;
  let a = parseFloat(document.getElementById("a").value);
  let b = parseFloat(document.getElementById("b").value);
  let h = parseFloat(document.getElementById("h").value);
  let roslina = document.getElementById("roslina").value;

  let V = 0;

  if (!a || !h) return blad();

  // 🟢 okrągła doniczka
  if (k === "kolo") {
    let r = a / 2;
    V = Math.PI * r * r * h;
  }

  // ⬛ prostokątna
  if (k === "prostokat") {
    V = a * a * h;
  }

  // 🔺 stożek
  if (k === "stozek") {
    if (!b) return blad();
    let r1 = a / 2;
    let r2 = b / 2;
    V = (1/3) * Math.PI * h * (r1*r1 + r1*r2 + r2*r2);
  }

  let litry = V / 1000;

  let tip = "";

  switch(roslina) {
    case "monstera":
      tip = "🌿 Lubi przepuszczalne, wilgotne podłoże";
      break;
    case "kaktus":
      tip = "🌵 Suche, mineralne podłoże";
      break;
    case "storczyk":
      tip = "🌸 Kora + bardzo przewiewne podłoże";
      break;
    case "fikus":
      tip = "🌿 Uniwersalne z drenażem";
      break;
    default:
      tip = "🌿 Standardowe podłoże";
  }

  document.getElementById("wynik").innerText =
    "📦 " + litry.toFixed(1) + " L podłoża";

  document.getElementById("hint").innerText = tip;
}

function blad() {
  document.getElementById("wynik").innerText = "⚠️ Uzupełnij dane";
  document.getElementById("hint").innerText = "";
}
</script>

</body>
</html>
